<h2>Mon profil</h2>

@if (form(); as f) {
  <form [formGroup]="f" (ngSubmit)="save()" class="profil-form">
    <label>
      Nom
      <input formControlName="nom" placeholder="Nom" />
    </label>
    <label>
      Prénom
      <input formControlName="prenom" placeholder="Prénom" />
    </label>
    <label>
      Téléphone
      <input formControlName="telephone" placeholder="Téléphone" />
    </label>
    <button type="submit" [disabled]="f.invalid">Enregistrer</button>
    @if (ok()) {
      <p class="succes">Profil mis à jour.</p>
    }
  </form>
} @else {
  <p>Chargement…</p>
}
