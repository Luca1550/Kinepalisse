<h2>Genres</h2>
<button (click)="toggleForm()">{{ showForm() ? 'Annuler' : '+ Nouveau genre' }}</button>

@if (showForm()) {
  <form [formGroup]="form" (ngSubmit)="creer()">
    <label>Nom du genre *
      <input formControlName="nomGenre" placeholder="Ex : Thriller" />
    </label>
    <button type="submit" [disabled]="form.invalid">Créer</button>
  </form>
}

@if (message()) {
  <p [style.color]="erreur() ? 'red' : 'green'">{{ message() }}</p>
}

<table>
  <thead>
    <tr><th>Genre</th><th></th></tr>
  </thead>
  <tbody>
    @for (g of genres(); track g.idGenre) {
      <tr>
        <td>{{ g.nomGenre }}</td>
        <td><button (click)="supprimer(g.idGenre)">Supprimer</button></td>
      </tr>
    } @empty {
      <tr><td colspan="2">Aucun genre.</td></tr>
    }
  </tbody>
</table>
