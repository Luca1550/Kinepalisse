services:
  mysql:
    image: mysql:8.0
    container_name: kine-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpwd
      MYSQL_DATABASE: kinepalisse
      MYSQL_USER: admin
      MYSQL_PASSWORD: KineDev
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      # Initialisation auto au PREMIER démarrage (volume vide).
      # Les fichiers .sql de /docker-entrypoint-initdb.d/ sont exécutés par ordre alpha.
      - ./db/create.sql:/docker-entrypoint-initdb.d/01-create.sql
      - ./db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
      # Persistance entre redémarrages :
      - kine-mysql-data:/var/lib/mysql

volumes:
  kine-mysql-data:
